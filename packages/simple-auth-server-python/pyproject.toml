[project]
name = "simple-auth-server"
version = "0.3.2"
description = "Server-side auth primitives (OTP, sessions, Google OAuth) with Redis"
readme = "README.md"
requires-python = ">=3.11"
urls = { Homepage = "https://github.com/crown-dev-studios/simple-auth", Repository = "https://github.com/crown-dev-studios/simple-auth" }
dependencies = [
  "httpx>=0.27.0",
  "redis>=5.0.0",
]

[build-system]
requires = ["setuptools>=69.0.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
